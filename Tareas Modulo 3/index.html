<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos Numéricos</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fondo con degradado animado */
            background: linear-gradient(-45deg, #ff7675, #74b9ff, #a29bfe, #ffeaa7);
            background-size: 400% 400%;
            animation: cambiarFondo 15s ease infinite;
            overflow: hidden;
        }
        
        /* Tarjeta con animación de entrada flotante */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            width: 400px;
            text-align: center;
            transform: translateY(50px);
            opacity: 0;
            animation: aparecerTarjeta 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Título con degradado de texto */
        h1 {
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Input interactivo */
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #dfe6e9;
            border-radius: 16px;
            background: #f5f6fa;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            color: #2d3436;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input:focus {
            border-color: #6c5ce7;
            background: #fff;
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.3);
            transform: scale(1.02);
        }
        
        /* Botón con efecto "pop" (rebote) al pasar el cursor */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(108, 92, 231, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        button:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 20px rgba(108, 92, 231, 0.6);
        }
        
        button:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 5px 10px rgba(108, 92, 231, 0.4);
        }
        
        /* Resultado destacado */
        #resultado {
            margin-top: 25px;
            font-size: 22px;
            color: #6c5ce7;
            font-weight: 600;
            min-height: 33px;
            transition: all 0.3s ease;
        }

        /* --- CLASES PARA ANIMACIONES CSS --- */
        @keyframes cambiarFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes aparecerTarjeta {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Analizador de Números</h1>

        <input type="number" id="numero" placeholder="Ingresa un número">

        <button id="btnAnalizar">
            Analizar Número
        </button>

        <p id="resultado"></p>
    </div>

    <script src="index.js"></script>

</body>

</html>
